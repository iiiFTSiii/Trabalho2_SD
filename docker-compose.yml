version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq_broker
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - sd_network

  sensor_1:
    build:
      context: .
      dockerfile: sensor/Dockerfile
    container_name: sensor_1
    environment:
      - NODE_ID=sensor_1
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - sd_network
    cap_add:
      - NET_ADMIN
    restart: unless-stopped

  sensor_2:
    build:
      context: .
      dockerfile: sensor/Dockerfile
    container_name: sensor_2
    environment:
      - NODE_ID=sensor_2
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - sd_network
    cap_add:
      - NET_ADMIN
    restart: unless-stopped

  # 4 instancias de semaforo, para permitir uma particao real 2x2
  # (Restricao B). Com TOTAL_NODES=4, quorum de maioria estrita = 3.
  # Nenhum dos dois lados de uma particao 2x2 atinge 3/4, entao nenhum
  # dos dois elege lider -> anti split-brain comprovado.
  semaforo_1:
    build:
      context: .
      dockerfile: semaforo/Dockerfile
    container_name: semaforo_1
    environment:
      - NODE_ID=semaforo_1
      - TOTAL_NODES=4
      - RABBITMQ_HOST=rabbitmq
      - STATE_FILE=/app/data/state.json
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - sd_network
    cap_add:
      - NET_ADMIN
    volumes:
      - semaforo_1_data:/app/data
    # Sem restart automatico: o objetivo da demo e o grupo religar o
    # no manualmente (docker start semaforo_1) e mostrar que o estado
    # e recuperado do checkpoint em volume persistente.
    restart: "no"

  semaforo_2:
    build:
      context: .
      dockerfile: semaforo/Dockerfile
    container_name: semaforo_2
    environment:
      - NODE_ID=semaforo_2
      - TOTAL_NODES=4
      - RABBITMQ_HOST=rabbitmq
      - STATE_FILE=/app/data/state.json
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - sd_network
    cap_add:
      - NET_ADMIN
    volumes:
      - semaforo_2_data:/app/data
    restart: "no"

  semaforo_3:
    build:
      context: .
      dockerfile: semaforo/Dockerfile
    container_name: semaforo_3
    environment:
      - NODE_ID=semaforo_3
      - TOTAL_NODES=4
      - RABBITMQ_HOST=rabbitmq
      - STATE_FILE=/app/data/state.json
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - sd_network
    cap_add:
      - NET_ADMIN
    volumes:
      - semaforo_3_data:/app/data
    restart: "no"

  semaforo_4:
    build:
      context: .
      dockerfile: semaforo/Dockerfile
    container_name: semaforo_4
    environment:
      - NODE_ID=semaforo_4
      - TOTAL_NODES=4
      - RABBITMQ_HOST=rabbitmq
      - STATE_FILE=/app/data/state.json
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - sd_network
    cap_add:
      - NET_ADMIN
    volumes:
      - semaforo_4_data:/app/data
    restart: "no"

networks:
  sd_network:
    name: sd_trafego_network
    driver: bridge

volumes:
  semaforo_1_data:
  semaforo_2_data:
  semaforo_3_data:
  semaforo_4_data:
